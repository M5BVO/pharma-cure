version: '3.8'

services:
  app:
    build: .
    image: m5bvo/pharma-cure-app:latest
    container_name: pharma-cure_production
    network_mode: "host" # Use host network to talk to local MariaDB on the server
    restart: always
    environment:
      - DB_HOST=127.0.0.1
      - DB_PORT=3306
      - DB_USER=mask
      - DB_PASSWORD=1984
      - DB_NAME=pharmacyManagement
      - PORT=5000
      - JWT_SECRET=production_clinical_sync_2026
    volumes:
      - ./uploads:/usr/src/app/uploads
      - ./init.sql:/usr/src/app/init.sql
